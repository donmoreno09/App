<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock face circle -->
  <circle cx="12" cy="12" r="10" stroke="#E8EAED" stroke-width="1.5" fill="none"/>

  <!-- Hour markers at 12, 3, 6, 9 -->
  <circle cx="12" cy="2" r="0.5" fill="#E8EAED"/>
  <circle cx="22" cy="12" r="0.5" fill="#E8EAED"/>
  <circle cx="12" cy="22" r="0.5" fill="#E8EAED"/>
  <circle cx="2" cy="12" r="0.5" fill="#E8EAED"/>

  <!-- Clock hands for 12:35:55 -->
  <!-- Hour hand pointing to 12 (straight up) -->
  <line x1="12" y1="12" x2="12" y2="7" stroke="#E8EAED" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Minute hand pointing to 7 (35 minutes = 7 on clock face) -->
  <!-- 35 minutes = 35/60 * 360 = 210 degrees from 12 o'clock -->
  <!-- 210 degrees puts us at 7 o'clock position -->
  <line x1="12" y1="12" x2="6.5" y2="17.5" stroke="#E8EAED" stroke-width="2" stroke-linecap="round"/>

  <!-- Second hand pointing to 11 (55 seconds = 11 on clock face) -->
  <!-- 55 seconds = 55/60 * 360 = 330 degrees from 12 o'clock -->
  <!-- 330 degrees puts us at 11 o'clock position -->
  <line x1="12" y1="12" x2="9" y2="4.5" stroke="#E8EAED" stroke-width="1" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.5" fill="#E8EAED"/>
</svg>
